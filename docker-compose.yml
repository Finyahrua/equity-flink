version: "3.8"

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: equity_flink_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - capital-net

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: equity_flink_kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 4
    networks:
      - capital-net

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: equity_flink_kafka_ui
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    depends_on:
      - kafka
      - zookeeper
    networks:
      - capital-net

  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    container_name: equity_flink_kafka_init
    depends_on:
      - kafka
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "
      echo 'Waiting for Kafka to be ready...'
      cub kafka-ready -b kafka:29092 1 60
      echo 'Creating topics...'
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic share-capital --partitions 4 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic other-capital --partitions 4 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic dividends-payable --partitions 4 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic core-capital-deductions --partitions 4 --replication-factor 1
      echo 'Topics created.'
      "
    networks:
      - capital-net

  flink-jobmanager:
    image: flink:1.18-java17
    container_name: equity_flink_jobmanager
    command: jobmanager
    ports:
      - "8081:8081"
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4
        parallelism.default: 2
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./flink-job/target:/opt/flink/usrlib
      - ./flink-libs:/opt/flink/lib/custom
    networks:
      - capital-net

  flink-taskmanager:
    image: flink:1.18-java17
    container_name: equity_flink_taskmanager
    command: taskmanager
    depends_on:
      - flink-jobmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4
        parallelism.default: 2
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./flink-libs:/opt/flink/lib/custom
    networks:
      - capital-net

networks:
  capital-net:
    driver: bridge
